<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grid Simulation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-900 text-white font-sans p-6">

    <div id="admin-panel" class="hidden max-w-4xl mx-auto bg-purple-900 p-4 rounded-lg shadow-lg mb-6 border-2 border-purple-500 flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-white">Instructor Controls</h2>
            <p class="text-sm text-purple-200">Current: <span id="admin-current-scenario">Scenario 1</span></p>
        </div>
        <div class="space-x-2">
            <button id="btn-start-scen1" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-bold">Load Scenario 1</button>
            <button id="btn-start-scen2" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-bold">Load Scenario 2</button>
            <button id="btn-reset" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded font-bold">Reset Data</button>
        </div>
    </div>

    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400" id="scenario-title">Scenario 1: Legacy Grid</h1>
        <p id="timer" class="text-xl">Time Remaining: 10:00</p>
    </header>

    <div id="consumer-view" class="hidden max-w-md mx-auto bg-gray-800 p-6 rounded-lg shadow-lg">
        <h2 class="text-2xl mb-4">Your Home (Group <span id="my-group"></span>)</h2>
        <div class="flex items-center justify-center w-full h-32 bg-green-500 rounded-lg mb-4 text-2xl font-bold" id="power-status">
            POWER ON
        </div>
        
        <label class="block mb-2 font-semibold">Consumption</label>
        <input type="range" id="consume-slider" min="0" max="100" class="w-full mb-6">
        
        <div id="smart-controls" class="hidden mb-6">
            <label class="block mb-2 font-semibold text-yellow-400">Solar Production</label>
            <input type="range" id="produce-slider" min="0" max="100" class="w-full">
        </div>

        <button id="call-help-btn" class="w-full bg-red-600 hover:bg-red-500 p-3 rounded font-bold hidden text-white shadow-lg">
            CALL GRID MANAGER
        </button>
    </div>

    <div id="manager-view" class="hidden grid grid-cols-2 gap-6 max-w-6xl mx-auto">
        
        <div id="predictive-routing-panel" class="col-span-2 bg-gray-800 p-6 rounded-lg hidden border border-yellow-500 mt-4">
            <h2 class="text-2xl mb-4 text-yellow-400 font-bold">⚠️ Predictive Load Routing</h2>
            <div id="routing-suggestions" class="space-y-2">
                </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-2xl mb-4">Substation Load</h2>
            <div id="substation-bars" class="space-y-4">
                <div>Node 1 <div class="w-full bg-gray-700 h-4 rounded"><div id="load-bar-1" class="bg-blue-500 h-4 rounded" style="width: 0%"></div></div></div>
                <div>Node 2 <div class="w-full bg-gray-700 h-4 rounded"><div id="load-bar-2" class="bg-blue-500 h-4 rounded" style="width: 0%"></div></div></div>
                <div>Node 3 <div class="w-full bg-gray-700 h-4 rounded"><div id="load-bar-3" class="bg-blue-500 h-4 rounded" style="width: 0%"></div></div></div>
                <div>Node 4 <div class="w-full bg-gray-700 h-4 rounded"><div id="load-bar-4" class="bg-blue-500 h-4 rounded" style="width: 0%"></div></div></div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-2xl mb-4">Inbox / Alerts</h2>
            <div id="inbox-list" class="space-y-2 max-h-64 overflow-y-auto">
                </div>
        </div>
    </div>

    <div id="results-view" class="hidden max-w-4xl mx-auto bg-gray-800 p-6 rounded-lg">
        <h2 class="text-3xl mb-4 text-center">Simulation Results</h2>
        <canvas id="resultsChart"></canvas>
    </div>

    <div id="chat-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-lg border border-gray-600 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-blue-400">Dispatch Chat: <span id="chat-user-id"></span></h3>
                <button id="close-chat-btn" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>

            <div id="chat-history" class="bg-gray-900 h-48 rounded p-3 mb-4 overflow-y-auto text-sm space-y-2">
                <div class="text-gray-400 italic">Connection established with consumer...</div>
            </div>

            <div class="w-full bg-gray-700 rounded-full h-4 mb-4">
                <div id="resolution-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div id="question-buttons" class="grid grid-cols-2 gap-2 mb-4">
                <button class="diag-btn bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm text-left" data-q="Have you checked your main breaker?" data-a="Yes, it's not tripped.">1. Check Main Breaker</button>
                <button class="diag-btn bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm text-left" data-q="Are your neighbors out of power too?" data-a="Yes, the whole street is dark.">2. Ask About Neighbors</button>
                <button class="diag-btn bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm text-left" data-q="Did you hear any loud pops outside?" data-a="No, everything just went quiet.">3. Check for Transformer Pop</button>
                <button class="diag-btn bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm text-left" data-q="Were you running heavy appliances?" data-a="Maybe just the AC and the oven...">4. Ask About Local Load</button>
            </div>

            <button id="restore-power-btn" class="w-full bg-green-600 hover:bg-green-500 p-3 rounded font-bold disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                DIAGNOSTICS INCOMPLETE
            </button>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
